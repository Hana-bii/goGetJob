services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gogetjob}
      POSTGRES_USER: ${POSTGRES_USER:-gogetjob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gogetjob}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-gogetjob} -d $${POSTGRES_DB:-gogetjob}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  storage:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  bucket-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      - storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-interview-guide}
    command:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://storage:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for storage"
          sleep 2
        done
        mc mb --ignore-existing "local/$$STORAGE_BUCKET"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CONFIG_PATH: ${CONFIG_PATH:-/app/configs/config.example.yaml}
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_ENV: ${APP_ENV:-dev}
      APP_NAME: ${APP_NAME:-goGetJob}
      DATABASE_DSN: ${DATABASE_DSN:-postgres://${POSTGRES_USER:-gogetjob}:${POSTGRES_PASSWORD:-gogetjob}@postgres:5432/${POSTGRES_DB:-gogetjob}?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_DB: ${REDIS_DB:-0}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://storage:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-interview-guide}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-dashscope}
      AI_PROVIDER_DASHSCOPE_BASE_URL: ${AI_PROVIDER_DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      AI_PROVIDER_DASHSCOPE_API_KEY: ${AI_PROVIDER_DASHSCOPE_API_KEY:-}
      AI_PROVIDER_DASHSCOPE_MODEL: ${AI_PROVIDER_DASHSCOPE_MODEL:-qwen-plus}
      AI_PROVIDER_LMSTUDIO_BASE_URL: ${AI_PROVIDER_LMSTUDIO_BASE_URL:-http://localhost:1234}
      AI_PROVIDER_LMSTUDIO_API_KEY: ${AI_PROVIDER_LMSTUDIO_API_KEY:-lm-studio}
      AI_PROVIDER_LMSTUDIO_MODEL: ${AI_PROVIDER_LMSTUDIO_MODEL:-qwen2.5-7b-instruct}
      RAG_REWRITE_ENABLED: ${RAG_REWRITE_ENABLED:-true}
      RAG_SHORT_QUERY_LENGTH: ${RAG_SHORT_QUERY_LENGTH:-4}
      RAG_TOPK_SHORT: ${RAG_TOPK_SHORT:-20}
      RAG_TOPK_MEDIUM: ${RAG_TOPK_MEDIUM:-12}
      RAG_TOPK_LONG: ${RAG_TOPK_LONG:-8}
      RAG_MIN_SCORE_SHORT: ${RAG_MIN_SCORE_SHORT:-0.18}
      RAG_MIN_SCORE_DEFAULT: ${RAG_MIN_SCORE_DEFAULT:-0.28}
      INTERVIEW_FOLLOW_UP_COUNT: ${INTERVIEW_FOLLOW_UP_COUNT:-1}
      INTERVIEW_EVALUATION_BATCH_SIZE: ${INTERVIEW_EVALUATION_BATCH_SIZE:-8}
      VOICE_LLM_PROVIDER: ${VOICE_LLM_PROVIDER:-dashscope}
      VOICE_TTS_DEFAULT_VOICE: ${VOICE_TTS_DEFAULT_VOICE:-siyue}
      VOICE_TTS_URL: ${VOICE_TTS_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
      VOICE_TTS_MODEL: ${VOICE_TTS_MODEL:-qwen3-tts-flash-realtime}
      VOICE_TTS_API_KEY: ${VOICE_TTS_API_KEY:-}
      VOICE_TTS_VOICE: ${VOICE_TTS_VOICE:-Cherry}
      VOICE_TTS_FORMAT: ${VOICE_TTS_FORMAT:-pcm}
      VOICE_TTS_SAMPLE_RATE: ${VOICE_TTS_SAMPLE_RATE:-24000}
      VOICE_TTS_MODE: ${VOICE_TTS_MODE:-commit}
      VOICE_TTS_LANGUAGE_TYPE: ${VOICE_TTS_LANGUAGE_TYPE:-Chinese}
      VOICE_TTS_SPEECH_RATE: ${VOICE_TTS_SPEECH_RATE:-1.0}
      VOICE_TTS_VOLUME: ${VOICE_TTS_VOLUME:-60}
      VOICE_ASR_URL: ${VOICE_ASR_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
      VOICE_ASR_MODEL: ${VOICE_ASR_MODEL:-qwen3-asr-flash-realtime}
      VOICE_ASR_API_KEY: ${VOICE_ASR_API_KEY:-}
      VOICE_ASR_LANGUAGE: ${VOICE_ASR_LANGUAGE:-zh}
      VOICE_ASR_FORMAT: ${VOICE_ASR_FORMAT:-pcm}
      VOICE_ASR_SAMPLE_RATE: ${VOICE_ASR_SAMPLE_RATE:-16000}
      VOICE_ASR_ENABLE_TURN_DETECTION: ${VOICE_ASR_ENABLE_TURN_DETECTION:-true}
      VOICE_ASR_TURN_DETECTION_TYPE: ${VOICE_ASR_TURN_DETECTION_TYPE:-server_vad}
      VOICE_ASR_TURN_DETECTION_THRESHOLD: ${VOICE_ASR_TURN_DETECTION_THRESHOLD:-0}
      VOICE_ASR_TURN_DETECTION_SILENCE_MS: ${VOICE_ASR_TURN_DETECTION_SILENCE_MS:-2000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  postgres-data:
  minio-data:
